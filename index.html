<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curvix Production Baseline</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        /* Viewport container handles system navbar masking safely */
        #curvix-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
    <script src="baseline.js" defer></script>
</head>
<body>

    <div id="curvix-container">
        <video id="vid" 
               autoplay 
               playsinline 
               muted 
               loop
               style="position: absolute; top: 50%; left: 50%; -webkit-transform: translate(-50%, -50%); transform: translate(-50%, -50%); z-index: 1;">
        </video>

        <canvas id="gl_overlay" 
                style="position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; will-change: transform; -webkit-transform: translateZ(0); transform: translateZ(0);">
        </canvas>
    </div>

</body>
</html>

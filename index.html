<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curvix Production Baseline</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            /* overflow: hidden; */
        }
        /* Viewport container handles system navbar masking safely */
        #curvix-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #b_cam{
            position: fixed;
            bottom: 0;
            right: 0;
            z-index: 3;
            margin: 20px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 20px;
            font-weight: 400;
            background-color: #eaeaea;
            padding: 10px 15px;
            border: 0 solid;
            border-radius: 5px;
        }
        #b_cam:hover{
            background-color: #ffffff;
        }
        #b_cam:active{
            background-color: #c6c6c6;
        }
        #camera-debug-panel{
            background-color: #fff;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 4;
            padding: 10px 15px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 15px;
        }
        #camera-debug-panel span{
            color: orangered;
        }
        #camera-debug-panel h1{
            color: rgb(0, 0, 0);
            font-size: 15px;
            margin: 0;
            margin-bottom: 5px;
        }

        #gl_overlay{
            position: absolute;
            bottom: 0px;
            left: 0px;
            z-index: 5;
        }
    </style>
    <script src="baseline.js" defer></script>
</head>
<body>
    <label id="b_cam">
        <input id="b_cam_input" type="checkbox" name="subscribe" value="newsletter">
        Camera on/off
    </label>
    <div id="camera-debug-panel">
        Initializing hardware layer...
        <span>data</span>
    </div>
    <div id="curvix-container">
        <video id="vid" 
               autoplay 
               playsinline 
               muted 
               loop
               style="position: absolute; top: 50%; left: 50%; -webkit-transform: translate(-50%, -50%); transform: translate(-50%, -50%); z-index: 1;">
        </video>

        <canvas id="gl_overlay" 
                style="pointer-events: none; will-change: transform; -webkit-transform: translateZ(0); transform: translateZ(0);">
        </canvas>
    </div>

</body>
</html>
